<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>

</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left"><div>A</div><div>♠</div></div>
      <div class="middle"><div>♠</div></div>
      <div class="right"><div>2</div><div>♣</div></div>
    </div>
    <div class="card">
      <div class="left"><div>2</div><div>♣</div></div>
      <div class="middle"><div>♣</div><div class="club2">♣</div></div>
      <div class="right"><div>2</div><div>♣</div></div>
    </div>
    <div class="card card3">
      <div class="left"><div>3</div><div>♥</div></div>
      <div class="middle"><div>♥</div><div>♥</div><div class="heart3">♥</div></div>
      <div class="right"><div>3</div><div>♥</div></div>
    </div>
  </main>
</body>

</html>
